name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,scrape,llm,mcp,web]"

      - name: Ruff
        run: ruff check agentzero tests scripts tools

      - name: Pytest
        run: pytest --cov=agentzero --cov-branch --cov-report=term-missing:skip-covered -q

      - name: Encoding check (UTF-8, no UTF-16 text files)
        run: python tools/encoding_check.py

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Docker build smoke
        env:
          DOCKER_BUILDKIT: "1"
        run: docker build -t agentzero:ci .
