# Install: pip install -e ".[dev]" && pre-commit install && pre-commit install --hook-type pre-push
# CodeQL runs on pre-push (1–3 min); ruff + encoding run on every commit.

minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
        args: [agentzero, tests, scripts, tools]

  - repo: local
    hooks:
      - id: encoding-check
        name: UTF-8 encoding check
        entry: python tools/encoding_check.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: codeql
        name: CodeQL Python security (GitHub parity)
        entry: python tools/codeql_check.py
        language: system
        pass_filenames: false
        stages: [pre-push]
