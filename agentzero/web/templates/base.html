<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}AgentZero{% endblock %}</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface-2: #eef0f4;
      --text: #1a1d26;
      --muted: #5c6370;
      --border: #d0d4dc;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --warn: #ca8a04;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
      --radius: 8px;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    [data-theme="dark"] {
      --bg: #0f1117;
      --surface: #1a1f2b;
      --surface-2: #252b3a;
      --text: #e8eaef;
      --muted: #9aa3b2;
      --border: #343b4d;
      --accent: #60a5fa;
      --accent-hover: #93c5fd;
      --danger: #f87171;
      --success: #4ade80;
      --warn: #facc15;
      --shadow: 0 1px 3px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    body {
      font-family: var(--font);
      margin: 0;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }
    .shell { max-width: 1200px; margin: 0 auto; padding: 1rem 1.5rem 2rem; }
    header.site-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      color: var(--text);
      text-decoration: none;
    }
    .brand:hover { text-decoration: none; }
    .brand-logo {
      display: block;
      height: 2.25rem;
      width: auto;
      max-width: min(12rem, 42vw);
    }
    nav.main-nav { display: flex; gap: 0.5rem; flex: 1; }
    nav.main-nav a {
      padding: 0.35rem 0.75rem;
      border-radius: var(--radius);
      color: var(--muted);
      text-decoration: none;
    }
    nav.main-nav a:hover, nav.main-nav a.active {
      background: var(--surface-2);
      color: var(--text);
      text-decoration: none;
    }
    nav.main-nav a.active { font-weight: 600; }
    .header-actions { display: flex; align-items: center; gap: 0.5rem; }
    button.theme-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 0.35rem 0.65rem;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button.theme-toggle:hover { background: var(--surface-2); }
    h1 { font-size: 1.35rem; margin: 0 0 0.5rem; }
    h2 { font-size: 1rem; margin: 0 0 0.5rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
    .muted { color: var(--muted); font-size: 0.875rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.15rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }
    .toolbar { margin: 0.75rem 0; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    .tracker-table-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
      overflow-x: auto;
    }
    table.data-table {
      border-collapse: collapse;
      table-layout: fixed;
      width: max-content;
      min-width: min(100%, 96vw);
      max-width: 96vw;
      margin: 0 auto;
      font-size: 0.875rem;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    table.data-table th, table.data-table td {
      border: 1px solid var(--border);
      padding: 0.4rem 0.55rem;
      line-height: 1.35;
      vertical-align: top;
    }
    table.data-table th {
      background: var(--surface-2);
      text-align: left;
      font-weight: 600;
      position: relative;
    }
    table.data-table th[data-col="title"],
    table.data-table td[data-col="title"] {
      min-width: 14rem;
      width: 18rem;
    }
    table.data-table th[data-col="company"],
    table.data-table td[data-col="company"] {
      min-width: 10rem;
      width: 12rem;
    }
    table.data-table th .col-resizer {
      position: absolute;
      top: 0;
      right: 0;
      width: 6px;
      height: 100%;
      cursor: col-resize;
      user-select: none;
    }
    table.data-table th .col-resizer:hover {
      background: color-mix(in srgb, var(--accent) 35%, transparent);
    }
    table.data-table th .th-sort-link {
      color: inherit;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding-right: 0.5rem;
      max-width: calc(100% - 8px);
    }
    table.data-table th .th-sort-link:hover { color: var(--accent); }
    table.data-table th .sort-indicator {
      font-size: 0.7rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    table.data-table th.sorted .sort-indicator { color: var(--accent); }
    table.data-table th.sorted .th-label { color: var(--accent); }
    table.data-table th.col-hidden,
    table.data-table td.col-hidden {
      display: none;
    }
    tr.job-row { cursor: pointer; }
    tr.job-row:hover td:not(.actions) { background: var(--surface-2); }
    .actions form { display: inline-flex; flex-wrap: wrap; gap: 0.25rem; align-items: center; margin: 0.1rem 0; }
    .actions input[type="text"], .actions select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.2rem 0.35rem;
      font-size: 0.8rem;
    }
    .actions button, .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 0.35rem 0.75rem;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .actions button:hover, .btn:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: var(--danger); }
    .cell-truncated {
      max-width: 14rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
      vertical-align: top;
    }
    td.data-cell[data-col="title"] .cell-text,
    td.data-cell[data-col="company"] .cell-text,
    td.data-cell[data-col="location"] .cell-text {
      display: block;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    td.data-cell[data-col="title"] .cell-truncated,
    td.data-cell[data-col="company"] .cell-truncated {
      white-space: normal;
      overflow: visible;
      text-overflow: unset;
      max-width: none;
    }
    td.data-cell { max-width: 14rem; }
    .column-picker {
      margin: 0.75rem 0 0.5rem;
      padding: 0.65rem 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .column-picker summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--text);
    }
    .column-picker-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 1rem;
      margin-top: 0.5rem;
    }
    .column-picker-grid label {
      font-size: 0.8125rem;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
    }
    .column-picker-actions {
      margin-top: 0.5rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-weight: 600;
    }
    .badge-ok { background: color-mix(in srgb, var(--success) 25%, transparent); color: var(--success); }
    .badge-warn { background: color-mix(in srgb, var(--warn) 25%, transparent); color: var(--warn); }
    .badge-off { background: var(--surface-2); color: var(--muted); }
    .source-grid { display: grid; gap: 0.5rem; }
    .source-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .source-row:last-child { border-bottom: none; }
    .source-row label { flex: 1; cursor: pointer; }
    .source-meta { font-size: 0.8rem; color: var(--muted); }
    pre.hint {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      font-size: 0.8rem;
      overflow-x: auto;
      white-space: pre-wrap;
      margin: 0.5rem 0 0;
    }
    .flash { padding: 0.65rem 0.85rem; border-radius: var(--radius); margin-bottom: 1rem; }
    .flash-ok { background: color-mix(in srgb, var(--success) 18%, var(--surface)); border: 1px solid var(--success); }
    .flash-err { background: color-mix(in srgb, var(--danger) 15%, var(--surface)); border: 1px solid var(--danger); }
    dl.detail-grid {
      display: grid;
      grid-template-columns: 10rem 1fr;
      gap: 0.25rem 0.75rem;
      font-size: 0.9rem;
    }
    dl.detail-grid dt { color: var(--muted); margin: 0; }
    dl.detail-grid dd { margin: 0; word-break: break-word; }
    .rationale, .description-block {
      white-space: pre-wrap;
      font-size: 0.9rem;
      line-height: 1.45;
      background: var(--surface-2);
      padding: 0.75rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .description-block { max-height: 24rem; overflow-y: auto; font-size: 0.85rem; }
    .detail-form { margin-bottom: 0.85rem; }
    .detail-label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.25rem; }
    .detail-form-row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    .detail-notes-input { flex: 1; min-width: 12rem; }
    .cover-letter-toolbar { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; align-items: center; }
    .cover-letter-form { margin-top: 0.5rem; }
    .cover-letter-textarea {
      width: 100%;
      min-height: 12rem;
      font-family: var(--font);
      font-size: 0.9rem;
      line-height: 1.45;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--text);
      resize: vertical;
    }
    form.inline-form { display: inline; }
    {% block extra_css %}{% endblock %}
  </style>
  <script>
    (function () {
      var key = "agentzero-theme";
      var root = document.documentElement;
      var saved = localStorage.getItem(key);
      if (saved === "dark" || saved === "light") {
        root.setAttribute("data-theme", saved);
      } else {
        root.setAttribute("data-theme", "dark");
      }
      document.addEventListener("DOMContentLoaded", function () {
        var btn = document.getElementById("theme-toggle");
        if (!btn) return;
        function label() {
          btn.textContent = root.getAttribute("data-theme") === "dark" ? "Light mode" : "Dark mode";
        }
        label();
        btn.addEventListener("click", function () {
          var next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
          root.setAttribute("data-theme", next);
          localStorage.setItem(key, next);
          label();
        });
      });
    })();
    document.addEventListener("click", function (e) {
      var row = e.target.closest("tr.job-row");
      if (!row || e.target.closest(".actions")) return;
      var href = row.getAttribute("data-href");
      if (href) window.location = href;
    });
  </script>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="shell">
    <header class="site-header">
      <a class="brand" href="/" aria-label="AgentZero home">
        <img
          class="brand-logo"
          src="/static/brand/agentzero.svg"
          alt="AgentZero"
          width="240"
          height="90"
          decoding="async"
        />
      </a>
      <nav class="main-nav">
        <a href="/" class="{% if nav_active == 'chat' %}active{% endif %}">Chat</a>
        <a href="/jobs" class="{% if nav_active == 'jobs' %}active{% endif %}">Jobs</a>
        <a href="/scraper" class="{% if nav_active == 'scraper' %}active{% endif %}">Scraper</a>
      </nav>
      <div class="header-actions">
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">Dark mode</button>
      </div>
    </header>
    {% block body %}{% endblock %}
  </div>
  {% block page_scripts %}{% endblock %}
</body>
</html>
